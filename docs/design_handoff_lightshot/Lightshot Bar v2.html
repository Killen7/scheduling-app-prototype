<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeamBuilder — Lightshot Bar</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #3d52a0;
    --navy-dark: #2d3f7c;
    --navy-light: #e8ecf7;
    --accent: #3d52a0;
    --text: #1a1f36;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f8f9fc;
    --white: #ffffff;
    --shift-blue: #dbeafe;
    --shift-blue-border: #bfdbfe;

    /* Lightshot — light mode */
    --ls-bg: rgba(255, 255, 255, 0.97);
    --ls-border: rgba(0,0,0,0.09);
    --ls-input-bg: rgba(0,0,0,0.03);
    --ls-text: #1a1f36;
    --ls-muted: #6b7280;
    --ls-accent: #3d52a0;
    --ls-accent2: #6d5bc8;
    --ls-hover: rgba(0,0,0,0.04);
    --ls-panel-bg: rgba(248,249,252,0.99);
    --ls-divider: rgba(0,0,0,0.07);
    --ls-success: #059669;
    --ls-warn: #d97706;
    --ls-error: #dc2626;
    --ls-radius: 16px;
    --ls-item-radius: 10px;
  }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── APP SHELL ── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar-announcement {
    background: var(--navy);
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    text-align: right;
    padding: 4px 20px;
  }

  .navbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    height: 52px;
    gap: 32px;
  }
  .navbar-logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .navbar-logo span { color: var(--navy); opacity: 0.6; font-weight: 400; }
  .navbar-nav { display: flex; gap: 4px; flex: 1; }
  .nav-item {
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    position: relative;
  }
  .nav-item.active { color: var(--navy); font-weight: 600; }
  .nav-item.active::after {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 0; right: 0;
    height: 2px;
    background: var(--navy);
  }
  .navbar-actions { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  .navbar-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
  .navbar-icon:hover { background: var(--navy-light); color: var(--navy); }
  .navbar-avatar {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 12px; color: var(--text); padding: 4px 8px;
    border-radius: 6px;
  }
  .navbar-avatar:hover { background: var(--navy-light); }
  .avatar-circle {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--navy); color: white;
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }

  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 8px 20px;
    gap: 8px;
  }
  .view-tabs { display: flex; gap: 2px; }
  .view-tab {
    padding: 5px 12px; font-size: 12px; font-weight: 500;
    border-radius: 6px; cursor: pointer; color: var(--text-muted);
    border: 1px solid transparent;
  }
  .view-tab.active { background: var(--navy); color: white; }
  .view-tab:not(.active):hover { background: var(--navy-light); }
  .select-pill {
    padding: 5px 10px 5px 12px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); border-radius: 6px;
    background: white; color: var(--text); cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .date-nav { display: flex; align-items: center; gap: 8px; margin: 0 auto; }
  .date-nav-arrow {
    width: 26px; height: 26px; border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); border: 1px solid var(--border);
    font-size: 12px;
  }
  .date-nav-arrow:hover { background: var(--navy-light); }
  .date-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 80px; text-align: center; }
  .toolbar-right { display: flex; gap: 6px; margin-left: auto; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); border: 1px solid var(--border); background: white;
  }
  .icon-btn:hover { background: var(--navy-light); color: var(--navy); border-color: var(--navy-light); }
  .add-shift-btn {
    display: flex; align-items: center; gap: 0;
    background: var(--navy); color: white; border-radius: 7px;
    font-size: 12px; font-weight: 600; cursor: pointer; overflow: hidden;
  }
  .add-shift-main { padding: 6px 12px; }
  .add-shift-arrow { padding: 6px 8px; border-left: 1px solid rgba(255,255,255,0.2); }

  /* schedule grid */
  .schedule-area { flex: 1; overflow: auto; }
  .time-header {
    display: grid;
    grid-template-columns: 192px repeat(15, 1fr);
    border-bottom: 1px solid var(--border);
    background: white;
    position: sticky; top: 0; z-index: 2;
  }
  .time-cell {
    font-size: 11px; color: var(--text-muted); padding: 6px 8px;
    border-right: 1px solid var(--border); text-align: center;
  }
  .time-cell:first-child { border-right: 1px solid var(--border); }

  .section-header {
    display: grid;
    grid-template-columns: 192px 1fr;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    padding: 7px 12px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--text-muted); text-transform: uppercase;
    border-right: 1px solid var(--border);
  }
  .section-toggle { display: flex; align-items: center; justify-content: flex-end; padding: 0 12px; cursor: pointer; color: var(--text-muted); }

  .person-row {
    display: grid;
    grid-template-columns: 192px 1fr;
    border-bottom: 1px solid var(--border);
    min-height: 56px;
  }
  .person-info {
    padding: 8px 12px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center; gap: 2px;
  }
  .person-avatar-row { display: flex; align-items: center; gap: 8px; }
  .person-circle {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--navy-light); color: var(--navy);
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .person-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .person-role { font-size: 10px; color: var(--text-muted); padding-left: 32px; }
  .person-badge { font-size: 9px; background: var(--navy-light); color: var(--navy); padding: 1px 5px; border-radius: 3px; margin-top: 2px; margin-left: 32px; width: fit-content; }

  .shift-timeline { position: relative; }
  .shift-block {
    position: absolute;
    top: 8px; height: calc(100% - 16px);
    background: var(--shift-blue);
    border: 1px solid var(--shift-blue-border);
    border-radius: 5px;
    display: flex; align-items: center;
    padding: 0 10px;
    font-size: 11px; font-weight: 500; color: #2563eb;
    white-space: nowrap;
  }

  /* ── LIGHTSHOT OVERLAY ── */
  .ls-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 120px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
    overflow: visible;
  }
  .ls-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .ls-container {
    width: 620px;
    max-width: calc(100vw - 32px);
    background: var(--ls-bg);
    border: 1px solid var(--ls-border);
    border-radius: var(--ls-radius);
    box-shadow:
      0 0 0 1px rgba(61,82,160,0.06),
      0 8px 32px rgba(0,0,0,0.12),
      0 32px 64px rgba(0,0,0,0.08);
    overflow: hidden;
    transform: scale(0.96) translateY(-8px);
    transition: transform 0.2s cubic-bezier(0.34,1.2,0.64,1);
    position: relative;
  }
  .ls-backdrop.open .ls-container {
    transform: scale(1) translateY(0);
  }

  .ls-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--ls-divider);
  }
  .ls-search-icon { color: var(--ls-muted); flex-shrink: 0; }
  .ls-input {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    font-size: 15px;
    color: var(--ls-text);
    font-family: inherit;
    caret-color: var(--ls-accent);
  }
  .ls-input::placeholder { color: var(--ls-muted); }
  .ls-kbd {
    font-size: 10px; color: var(--ls-muted);
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 5px;
    padding: 2px 6px;
    font-family: inherit;
    white-space: nowrap;
  }

  /* quick picks */
  .ls-quick-picks {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--ls-divider);
    flex-wrap: wrap;
  }
  .ls-pick {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid rgba(0,0,0,0.09);
    background: rgba(0,0,0,0.03);
    color: var(--ls-text);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.13s ease;
    user-select: none;
  }
  .ls-pick:hover, .ls-pick.active {
    background: rgba(61,82,160,0.08);
    border-color: rgba(61,82,160,0.25);
    color: var(--ls-accent);
  }
  .ls-pick.active {
    background: rgba(61,82,160,0.1);
    border-color: rgba(61,82,160,0.35);
  }
  /* Primary "Create Shift" pick — always navy filled */
  .ls-pick-primary {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
  }
  .ls-pick-primary:hover {
    background: var(--navy-dark);
    border-color: var(--navy-dark);
    color: white;
  }
  .ls-pick-primary.active {
    background: var(--navy-dark);
    border-color: var(--navy-dark);
    color: white;
  }
  .ls-pick-primary .ls-pick-icon {
    background: rgba(255,255,255,0.18);
    color: white;
  }
  .ls-pick-icon {
    width: 20px; height: 20px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  .ls-pick-icon.shift { background: rgba(61,82,160,0.12); color: #3d52a0; }
  .ls-pick-icon.people { background: rgba(5,150,105,0.1); color: #059669; }
  .ls-pick-icon.offices { background: rgba(217,119,6,0.1); color: #d97706; }
  .ls-pick-icon.ai { background: linear-gradient(135deg, rgba(109,91,200,0.12), rgba(61,82,160,0.12)); color: #6d5bc8; }

  /* results / panels */
  .ls-results {
    max-height: 480px;
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  .ls-results::-webkit-scrollbar { width: 4px; }
  .ls-results::-webkit-scrollbar-track { background: transparent; }
  .ls-results::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

  .ls-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--ls-muted); text-transform: uppercase;
    padding: 10px 16px 4px;
    border-bottom: none;
  }

  .ls-result-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 14px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.1s;
    position: relative;
  }
  .ls-result-item:hover, .ls-result-item.focused {
    background: var(--ls-hover);
  }
  .ls-result-item.focused::before {
    content: '';
    position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 2px; background: var(--ls-accent);
    border-radius: 0 2px 2px 0;
  }
  .ls-result-title { font-size: 13px; font-weight: 500; color: var(--ls-text); }
  .ls-result-sub { font-size: 11px; color: var(--ls-muted); margin-top: 1px; }
  .ls-result-icon {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .ls-result-content { flex: 1; min-width: 0; }
  .ls-result-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    font-weight: 500; flex-shrink: 0;
  }
  .badge-avail { background: rgba(5,150,105,0.1); color: #059669; }
  .badge-partial { background: rgba(217,119,6,0.1); color: #d97706; }
  .badge-busy { background: rgba(220,38,38,0.1); color: #dc2626; }
  .badge-pto { background: rgba(220,38,38,0.08); color: #dc2626; }

  .ls-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    border-top: 1px solid var(--ls-divider);
  }
  .ls-footer-hints { display: flex; gap: 10px; }
  .ls-hint { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--ls-muted); }

  /* ── EXPANDED PANELS ── */
  .ls-panel {
    padding: 0;
  }

  /* Create Shift Panel */
  .shift-panel { padding: 16px; }
  .shift-panel-title {
    font-size: 13px; font-weight: 600; color: var(--ls-text);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .shift-panel-title .step-badge {
    font-size: 10px; background: rgba(61,82,160,0.1); color: var(--ls-accent);
    padding: 2px 8px; border-radius: 20px; font-weight: 500;
  }

  .shift-steps { display: flex; gap: 4px; margin-bottom: 16px; }
  .shift-step {
    flex: 1; height: 3px; border-radius: 2px;
    background: rgba(0,0,0,0.08);
    transition: background 0.3s;
  }
  .shift-step.done { background: var(--ls-accent); }
  .shift-step.active { background: rgba(61,82,160,0.4); }

  .field-group { margin-bottom: 12px; }
  .field-label { font-size: 11px; color: var(--ls-muted); margin-bottom: 5px; font-weight: 500; }
  .field-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .field-opt {
    padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 500;
    border: 1px solid rgba(0,0,0,0.1); color: var(--ls-muted);
    cursor: pointer; transition: all 0.12s; background: rgba(0,0,0,0.02);
  }
  .field-opt:hover { border-color: rgba(61,82,160,0.35); color: var(--ls-accent); background: rgba(61,82,160,0.05); }
  .field-opt.selected {
    background: rgba(61,82,160,0.1); border-color: rgba(61,82,160,0.4);
    color: var(--ls-text);
    font-weight: 600;
  }

  .time-range { display: flex; gap: 8px; align-items: center; }
  .time-input {
    flex: 1;
    background: rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px; font-weight: 600;
    color: var(--ls-text);
    font-family: inherit;
    outline: none;
    text-align: center;
  }
  .time-input:focus { border-color: rgba(61,82,160,0.4); background: rgba(61,82,160,0.05); }
  .time-sep { color: var(--ls-muted); font-size: 14px; }

  .ls-action-btn {
    width: 100%; padding: 10px;
    background: var(--ls-accent);
    border: none; border-radius: 9px;
    color: white; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    margin-top: 4px;
    transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .ls-action-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .ls-action-btn:active { transform: translateY(0); }
  .ls-action-btn.secondary {
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.1);
    color: var(--ls-text);
  }
  .ls-action-btn.secondary:hover { background: rgba(0,0,0,0.07); }

  .conflict-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 10px; border-radius: 7px;
    background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.15);
    font-size: 11px; color: #dc2626; margin-top: 8px;
  }
  .ok-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 10px; border-radius: 7px;
    background: rgba(5,150,105,0.07); border: 1px solid rgba(5,150,105,0.2);
    font-size: 11px; color: #059669; margin-top: 8px;
  }

  /* People panel */
  .people-grid { padding: 8px 0; }
  .person-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .person-item:hover { background: var(--ls-hover); }
  .person-avail-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    margin-left: auto;
  }
  .dot-avail { background: #059669; }
  .dot-partial { background: #d97706; }
  .dot-busy { background: #dc2626; }

  /* AI panel */
  .ai-panel { padding: 14px 16px; }
  .ai-thinking {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ls-muted);
    padding: 8px 0;
  }
  .ai-dots span {
    display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ls-accent);
    animation: blink 1.2s infinite;
    margin-right: 2px;
  }
  .ai-dots span:nth-child(2) { animation-delay: 0.2s; }
  .ai-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .ai-response {
    background: rgba(61,82,160,0.05);
    border: 1px solid rgba(61,82,160,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px; color: var(--ls-text);
    line-height: 1.55;
    margin-bottom: 12px;
  }
  .ai-action-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .ai-chip {
    padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 500;
    border: 1px solid rgba(61,82,160,0.2);
    color: var(--ls-accent); cursor: pointer; background: rgba(61,82,160,0.06);
    transition: all 0.12s;
  }
  .ai-chip:hover { background: rgba(61,82,160,0.12); border-color: rgba(61,82,160,0.35); }

  .ai-gradient-border {
    background: linear-gradient(var(--ls-bg), var(--ls-bg)) padding-box,
                linear-gradient(135deg, #6e8efb, #a78bfa) border-box;
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 2px;
    margin-bottom: 10px;
  }
  .ai-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
    color: var(--ls-accent2); text-transform: uppercase;
    padding: 4px 10px;
    background: rgba(109,91,200,0.08);
    border-radius: 20px;
    margin-bottom: 10px;
  }

  /* offices panel */
  .office-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--ls-divider);
    position: relative;
  }
  .office-item:last-child { border-bottom: none; }
  .office-item:hover { background: var(--ls-hover); }
  .office-item:hover::before {
    content: '';
    position: absolute; left:0; top:4px; bottom:4px;
    width:2px; background: var(--ls-accent); border-radius: 0 2px 2px 0;
  }

The user typed: "${query}"

Respond in 1-2 short sentences as a scheduling assistant. Suggest what action to take (create a shift, view people availability, check an office, etc). Be concise and helpful. Do NOT use markdown.`

// ── LIGHTSHOT BAR ──
function LightshotBar({ onSuccess }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState('');
  const [activePanel, setActivePanel] = useState(null);
  const [hoveredOffice, setHoveredOffice] = useState(null);
  const [hoveredPerson, setHoveredPerson] = useState(null);
  const inputRef = useRef(null);
  const backdropRef = useRef(null);

  const openBar = useCallback(() => {
    setOpen(true);
    setQuery('');
    setActivePanel(null);
    setHoveredOffice(null);
    setHoveredPerson(null);
    setTimeout(() => inputRef.current?.focus(), 80);
  }, []);

  const closeBar = useCallback(() => {
    setOpen(false);
    setTimeout(() => {
      setQuery('');
      setActivePanel(null);
      setHoveredOffice(null);
      setHoveredPerson(null);
    }, 200);
  }, []);

  const dismissPeek = useCallback(() => {
    setHoveredOffice(null);
    setHoveredPerson(null);
  }, []);

  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        open ? closeBar() : openBar();
        return;
      }
      if (e.key === 'Escape') {
        if (hoveredOffice || hoveredPerson) {
          e.preventDefault();
          e.stopPropagation();
          dismissPeek();
        } else if (open) {
          closeBar();
        }
        return;
      }
      // Any non-modifier key dismisses the peek (but keeps bar open)
      if (open && (hoveredOffice || hoveredPerson)) {
        if (!e.metaKey && !e.ctrlKey && !e.altKey && e.key !== 'Escape') {
          dismissPeek();
        }
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, openBar, closeBar, dismissPeek, hoveredOffice, hoveredPerson]);

  function handlePickClick(panel) {
    dismissPeek();
    if (activePanel === panel) {
      setActivePanel(null);
    } else {
      setActivePanel(panel);
      if (panel !== 'shift') setTimeout(() => inputRef.current?.focus(), 50);
    }
  }

  function handleQueryChange(e) {
    const v = e.target.value;
    setQuery(v);
    if (v.length > 3 && activePanel === null) {
      setActivePanel('ai');
    } else if (v.length === 0 && activePanel === 'ai') {
      setActivePanel(null);
    }
  }

  function handleAIAction(action) {
    if (action === 'Create shift' || action === 'create') {
      setQuery(''); setActivePanel('shift');
    } else if (action.includes('availabl') || action.includes('people')) {
      setQuery(''); setActivePanel('people');
    } else if (action.includes('office') || action.includes('capacity')) {
      setQuery(''); setActivePanel('offices');
    }
  }

  const isAI = activePanel === 'ai' || (query.length > 3 && activePanel === null);
  const hasPeek = !!(hoveredOffice || hoveredPerson);

  return (
    <>
      {/* Hint bar */}
      <div className="hint-bar">
        Press <kbd>⌘K</kbd> to open Lightshot
      </div>

      {/* Backdrop */}
      <div
        ref={backdropRef}
        className={`ls-backdrop ${open ? 'open' : ''}`}
        onClick={e => { if (e.target === backdropRef.current) closeBar(); }}
      >
        {/* Peek cards — absolute overlay INSIDE the ls-container over the results */}
        <div className="ls-container" style={{position:'relative'}}>
          {/* Peek overlay — covers input+picks+results+footer */}
          {(hoveredOffice || hoveredPerson) && (
            <div className="peek-wrap">
              {hoveredOffice && <OfficePeek office={hoveredOffice} onDismiss={dismissPeek} />}
              {hoveredPerson && !hoveredOffice && <PersonPeek person={hoveredPerson} onDismiss={dismissPeek} />}
            </div>
          )}
          {/* Input row */}
          <div className="ls-input-row">
            {isAI ? (
              <svg className="ls-search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 1.5L9.4 5.1L13 5.7L10.5 8.1L11.1 11.7L8 9.9L4.9 11.7L5.5 8.1L3 5.7L6.6 5.1L8 1.5Z" fill="#c4b5fd" stroke="#c4b5fd" strokeWidth="0.5"/>
              </svg>
            ) : (
              <svg className="ls-search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" strokeWidth="1.5"/>
                <path d="M10 10.5L13 13.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            )}
            <input
              ref={inputRef}
              className="ls-input"
              placeholder={
                activePanel === 'shift' ? "Search offices, people…" :
                activePanel === 'people' ? "Search people by name or role…" :
                activePanel === 'offices' ? "Search offices…" :
                "Search or ask anything…"
              }
              value={query}
              onChange={handleQueryChange}
              onKeyDown={e => { if (e.key === 'Escape') { if (hasPeek) { e.stopPropagation(); dismissPeek(); } else closeBar(); } }}
            />
            {hasPeek
              ? <kbd className="ls-kbd" style={{color:'#fbbf24', borderColor:'rgba(251,191,36,0.3)'}}>any key closes peek</kbd>
              : <kbd className="ls-kbd">ESC</kbd>
            }
          </div>

          {/* Quick picks */}
          <div className="ls-quick-picks">
            <div className={`ls-pick ls-pick-primary ${activePanel === 'shift' ? 'active' : ''}`} onClick={() => handlePickClick('shift')}>
              <span className="ls-pick-icon shift">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1.5V9.5M1.5 5.5H9.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
              </span>
              Create Shift
            </div>
            <div className={`ls-pick ${activePanel === 'people' ? 'active' : ''}`} onClick={() => handlePickClick('people')}>
              <span className="ls-pick-icon people">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="3.5" r="2" stroke="currentColor" strokeWidth="1.2"/><path d="M1 9.5C1 7.5 3 6 5.5 6C8 6 10 7.5 10 9.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>
              </span>
              People
            </div>
            <div className={`ls-pick ${activePanel === 'offices' ? 'active' : ''}`} onClick={() => handlePickClick('offices')}>
              <span className="ls-pick-icon offices">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1.5" y="3" width="8" height="7" rx="1" stroke="currentColor" strokeWidth="1.2"/><path d="M3.5 3V2a2 2 0 014 0v1" stroke="currentColor" strokeWidth="1.2"/></svg>
              </span>
              Offices
            </div>
            <div className={`ls-pick ${isAI ? 'active' : ''}`} onClick={() => { setActivePanel('ai'); inputRef.current?.focus(); }}>
              <span className="ls-pick-icon ai">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1L6.6 3.9L9.5 4.4L7.5 6.3L8 9.2L5.5 7.9L3 9.2L3.5 6.3L1.5 4.4L4.4 3.9L5.5 1Z" fill="currentColor"/></svg>
              </span>
              Ask AI
            </div>
          </div>

          {/* Panel content */}
          <div className="ls-results">
            {activePanel === 'shift' && (
              <ShiftPanel onClose={closeBar} onSuccess={onSuccess} />
            )}
            {activePanel === 'people' && (
              <PeoplePanel
                query={query}
                onPersonHover={p => { setHoveredPerson(p); setHoveredOffice(null); }}
                onPersonLeave={() => {}}
              />
            )}
            {activePanel === 'offices' && (
              <OfficesPanel
                query={query}
                onOfficeHover={o => { setHoveredOffice(o); setHoveredPerson(null); }}
                onOfficeLeave={() => {}}
              />
            )}
            {activePanel === 'ai' && query.length > 0 && (
              <AIPanel query={query} onAction={handleAIAction} />
            )}
            {activePanel === 'ai' && query.length === 0 && (
              <div style={{padding:'16px', color:'var(--ls-muted)', fontSize:13}}>
                Type anything — e.g. "schedule Alice for tomorrow morning" or "who's available Friday?"
              </div>
            )}
            {activePanel === null && query.length === 0 && (
              <div style={{padding: '10px 14px 14px'}}>
                <div className="ls-section-label">Recent</div>
                {[
                  {icon:'🏥', title:'2nd Floor', sub:'Viewed 2 min ago', color:'rgba(251,191,36,0.12)'},
                  {icon:'👤', title:'Andersons, Adam', sub:'Shift created today at 8:00 AM', color:'rgba(110,142,251,0.12)'},
                  {icon:'📋', title:'Shift — May 4, 2026', sub:'8:00 AM – 4:00 PM · 2nd Floor', color:'rgba(52,211,153,0.12)'},
                ].map(item => (
                  <div key={item.title} className="ls-result-item" style={{borderRadius:8}}>
                    <div className="ls-result-icon" style={{background:item.color, fontSize:14}}>{item.icon}</div>
                    <div className="ls-result-content">
                      <div className="ls-result-title">{item.title}</div>
                      <div className="ls-result-sub">{item.sub}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Footer */}
          <div className="ls-footer">
            <div className="ls-footer-hints">
              <span className="ls-hint"><kbd className="ls-kbd">↑↓</kbd> Navigate</span>
              <span className="ls-hint"><kbd className="ls-kbd">↵</kbd> Select</span>
              <span className="ls-hint"><kbd className="ls-kbd">ESC</kbd> Close</span>
              {(activePanel === 'people' || activePanel === 'offices') && (
                <span className="ls-hint" style={{color:'rgba(251,191,36,0.5)'}}>
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{marginRight:2}}>
                    <path d="M5 1.5C3 1.5 1.5 3 1.5 5S3 8.5 5 8.5 8.5 7 8.5 5 7 1.5 5 1.5Z" stroke="currentColor" strokeWidth="1" fill="none"/>
                    <path d="M5 4v2M5 6.5v.5" stroke="currentColor" strokeWidth="1" strokeLinecap="round"/>
                  </svg>
                  Hover to preview
                </span>
              )}
            </div>
            <span style={{fontSize:10, color:'var(--ls-muted)', fontWeight:600, letterSpacing:'0.06em'}}>LIGHTSHOT</span>
          </div>
        </div>
      </div>
    </>
  );
}

// ── APP SHELL ──
function AppShell() {
  const [toast, setToast] = useState(null);
  const [toastVisible, setToastVisible] = useState(false);

  function showToast(msg) {
    setToast(msg);
    setToastVisible(true);
    setTimeout(() => setToastVisible(false), 3000);
  }

  return (
    <>
      <div className="app">
        {/* Announcement */}
        <div className="topbar-announcement">Exercitationem sed labore et voluptat</div>

        {/* Navbar */}
        <nav className="navbar">
          <div className="navbar-logo">⬡TeamBuilder<span>™</span></div>
          <div className="navbar-nav">
            {['Home','Schedule','Availability','Reporting','Insights','Insights'].map((n,i) => (
              <div key={i} className={`nav-item ${i === 1 ? 'active' : ''}`}>{n}</div>
            ))}
          </div>
          <div className="navbar-actions">
            <div className="navbar-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2" y="2" width="11" height="11" rx="2" stroke="currentColor" strokeWidth="1.3"/><path d="M5 7.5h5M7.5 5v5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
            </div>
            <div className="navbar-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 2a5.5 5.5 0 015.5 5.5c0 2.3-.5 3.7-1.5 4.5H4C3 11.2 2 9.8 2 7.5A5.5 5.5 0 017.5 2Z" stroke="currentColor" strokeWidth="1.3"/><path d="M6 13h3" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
            </div>
            <div className="navbar-icon">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" strokeWidth="1.3"/><path d="M7.5 5v3l2 1" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <div className="navbar-avatar">
              <div className="avatar-circle">SA</div>
              S.Admin ▾
            </div>
          </div>
        </nav>

        {/* Toolbar */}
        <div className="toolbar">
          <div className="view-tabs">
            {['Month','Week','Day'].map((v,i) => (
              <div key={v} className={`view-tab ${i === 2 ? 'active' : ''}`}>{v}</div>
            ))}
          </div>
          <div className="select-pill">
            2nd Floor
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 4l2 2 2-2" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>
          </div>
          <div className="date-nav">
            <div className="date-nav-arrow">«</div>
            <div className="date-label">3 May 2026</div>
            <div className="date-nav-arrow">»</div>
          </div>
          <div className="toolbar-right">
            <div className="icon-btn">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/><rect x="7" y="1" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/><rect x="1" y="7" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/><rect x="7" y="7" width="5" height="5" rx="1" stroke="currentColor" strokeWidth="1.2"/></svg>
            </div>
            <div className="icon-btn">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 3h11M1 6.5h11M1 10h11" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>
            </div>
            <div className="icon-btn">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 4h11M3 1v2M10 1v2" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/><rect x="1" y="4" width="11" height="8" rx="1" stroke="currentColor" strokeWidth="1.2"/></svg>
            </div>
            <div className="add-shift-btn" onClick={() => {
              window.dispatchEvent(new KeyboardEvent('keydown', { metaKey: true, key: 'k', bubbles: true }));
            }}>
              <span className="add-shift-main">Add shift</span>
              <span className="add-shift-arrow">▾</span>
            </div>
          </div>
        </div>

        {/* Schedule */}
        <div className="schedule-area">
          {/* Time header */}
          <div className="time-header">
            <div className="time-cell" style={{borderRight:'1px solid var(--border)'}}></div>
            {TIMES.map(t => (
              <div key={t} className="time-cell">{t}</div>
            ))}
          </div>

          {/* Rows */}
          {SCHEDULE_PEOPLE.map((section, si) => (
            <React.Fragment key={si}>
              <div className="section-header">
                <div className="section-label">{section.section}</div>
                <div className="section-toggle">∧</div>
              </div>
              {section.people.map((person, pi) => (
                <div key={pi} className="person-row">
                  <div className="person-info">
                    <div className="person-avatar-row">
                      <div className="person-circle">{person.name[0]}</div>
                      <div className="person-name">{person.name}</div>
                    </div>
                    <div className="person-role">{person.role}</div>
                    {person.badge && <div className="person-badge">{person.badge}</div>}
                  </div>
                  <div className="shift-timeline" style={{position:'relative'}}>
                    <div className="shift-block" style={{
                      left: `${person.shift.start}%`,
                      width: `${person.shift.end - person.shift.start}%`,
                    }}>
                      {person.shift.label}
                    </div>
                  </div>
                </div>
              ))}
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* Lightshot */}
      <LightshotBar onSuccess={showToast} />

      {/* Toast */}
      <div className={`toast ${toastVisible ? 'show' : ''}`}>
        <div className="toast-dot"></div>
        {toast}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppShell />);
</script>
